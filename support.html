<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Tails - Assistenza</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Ufficiale World of Tails */
            --dark-brown: #3D2817;
            --cream: #F5F1EB;
            --forest-green: #6B8E5D;
            --forest-green-hover: #5A784E;
            --gold: #D4A574;
            --light-coral: #E07856;
            --white-glass: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--cream) 0%, #E8E2D5 100%);
            color: var(--dark-brown);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Elementi decorativi di sfondo */
        .decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            opacity: 0.6;
        }
        .dec-1 {
            background: var(--gold);
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
        }
        .dec-2 {
            background: var(--light-coral);
            width: 400px;
            height: 400px;
            bottom: -150px;
            right: -100px;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--white-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(61, 40, 23, 0.08);
            transform: translateY(0);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(61, 40, 23, 0.12);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--forest-green);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.1rem;
            color: #664D33;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-brown);
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(212, 165, 116, 0.3);
            border-radius: 16px;
            font-size: 1rem;
            color: var(--dark-brown);
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: #A39180;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--forest-green);
            box-shadow: 0 0 0 4px rgba(107, 142, 93, 0.15);
            background: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 1.2rem;
            background: var(--forest-green);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(107, 142, 93, 0.3);
            margin-top: 1rem;
        }

        button:hover {
            background: var(--forest-green-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(107, 142, 93, 0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 5px 10px rgba(107, 142, 93, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1.5rem;
            }
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="decoration dec-1"></div>
    <div class="decoration dec-2"></div>

    <div class="container">
        <div class="header">
            <h1>World of Tails</h1>
            <p>Hai bisogno di aiuto con l'app? Il nostro team magico è pronto ad assisterti!</p>
        </div>

        <!-- NOTA: Sostituisci tua.email@esempio.com con la tua email reale! -->
        <form id="supportForm" action="mailto:tua.email@esempio.com" method="POST" enctype="text/plain">
            
            <div class="form-group">
                <label for="name">Nome (o nome del genitore)</label>
                <input type="text" id="name" name="Nome" placeholder="Come ti chiami?" required>
            </div>

            <div class="form-group">
                <label for="email">Indirizzo Email</label>
                <input type="email" id="email" name="Email" placeholder="La tua email per poterti rispondere" required>
            </div>

            <div class="form-group">
                <label for="topic">Di cosa hai bisogno?</label>
                <select id="topic" name="Argomento" required>
                    <option value="" disabled selected>Seleziona un argomento...</option>
                    <option value="Problema Tecnico/Bug">C'è un problema tecnico o un bug</option>
                    <option value="Domanda">Ho una domanda su come funziona l'app</option>
                    <option value="Suggerimento">Voglio suggerire una nuova fiaba o funzione</option>
                    <option value="Altro">Altro</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Il tuo messaggio</label>
                <textarea id="message" name="Messaggio" placeholder="Raccontaci tutto nei minimi dettagli..." required></textarea>
            </div>

            <button type="submit">Invia Richiesta ✨</button>
        </form>
    </div>

</body>
</html>
